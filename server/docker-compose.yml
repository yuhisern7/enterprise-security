version: '3.8'

services:
  enterprise-security:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: enterprise-security-ai
    restart: unless-stopped
    
    # Network mode: host is required for device scanning to see network devices
    # This allows the container to scan the actual host network (192.168.x.x)
    # Note: In host mode, port mapping is not needed - uses host ports directly
    network_mode: host
    
    # Capabilities for packet capture (more secure than privileged: true)
    cap_add:
      - NET_ADMIN
      - NET_RAW
    
    # Alternative to privileged (more secure, but may not work on all systems)
    # cap_add:
    #   - NET_ADMIN
    #   - NET_RAW
    
    # Volumes - persist data between restarts
    volumes:
      - ./json:/app/json
      - ../AI:/app/AI
      - ../AI/exploitdb:/app/AI/exploitdb:ro  # Optional: read-only, can be removed for client mode
    
    # Environment variables (load from .env file in server directory)
    env_file:
      - .env
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - TZ=${TZ:-Asia/Kuala_Lumpur}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
      - AI_LEARNING_ENABLED=${AI_LEARNING_ENABLED:-true}
      - DASHBOARD_PORT=${DASHBOARD_PORT:-60000}
      - P2P_PORT=${P2P_PORT:-60001}
      - SIGNATURE_MODE=${SIGNATURE_MODE:-auto}  # auto, master, or client
    
    # Health check (uses configured dashboard port)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${DASHBOARD_PORT:-60000}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# Optional: persistent data volumes (uncomment if you want Docker-managed volumes)
# volumes:
#   security_data:
#     driver: local
