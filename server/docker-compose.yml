version: '3.8'

services:
  enterprise-security:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: enterprise-security-ai
    restart: unless-stopped
    
    # Network mode - REQUIRED for monitoring your actual network
    network_mode: "host"
    
    # Privileged mode - REQUIRED for packet capture
    privileged: true
    
    # Alternative to privileged (more secure, but may not work on all systems)
    # cap_add:
    #   - NET_ADMIN
    #   - NET_RAW
    
    # Volumes - persist data between restarts
    volumes:
      - ./json:/app/json
      - ../AI:/app/AI
      - ../AI/exploitdb:/app/AI/exploitdb
    
    # Environment variables (load from .env file in parent directory)
    env_file:
      - ../.env
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - TZ=${TZ:-Asia/Kuala_Lumpur}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY:-}
      - AI_LEARNING_ENABLED=${AI_LEARNING_ENABLED:-true}
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# Optional: persistent data volumes (uncomment if you want Docker-managed volumes)
# volumes:
#   security_data:
#     driver: local
