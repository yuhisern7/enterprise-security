services:
  enterprise-security:
    build:
      context: ..
      dockerfile: server/Dockerfile
    container_name: enterprise-security-ai
    ports:
      - "60000:60000"
      - "60001:60001"
    privileged: true
    env_file:
      - .env
    volumes:
      - ./json:/app/json
      - ../AI/ml_models:/app/AI/ml_models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:60000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    environment:
      - PYTHONUNBUFFERED=1
      - TZ=${TZ:-Asia/Kuala_Lumpur}
